# air config — https://github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/autograder"
  cmd = "go build -o ./tmp/autograder ./cmd/server"
  delay = 500
  exclude_dir = ["tmp", "web", "marker", "bin", "files", "schema", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "yml"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
