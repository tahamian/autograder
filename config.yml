labs:
  -
    id: lab_1
    name: Lab 1 - Hello world Program
    problem_statement: Write a program in python that prints "Hello World"\nmake sure you have the correct spelling
    testcase:
      -
        expected:
          -
            feedback: "Correct!"
            points: 1.0
            values:
              - "Hello World"
              - "hello world"
              - "Hello world"
              - "hello world"
        type: stdout
        name: hello_world
        functions:
          -
  -
    id: lab_2
    name: Lab 2 - Pythagorean Theorem
    problem_statement: |
      Write a function called pythagorean(a,b) that takes 2 inputs a, and b which are 2 sides of a
      right angle triangle \n returns the hypotenuse c of the triangle

    testcase:
      -
        type: function
        name: hello
        functions:
          - function_name: pythagorean
            function_args:
            - value: 3.0
              type: float
            - value: 4.0
              type: float
        expected:
          -
            feedback: Nice
            points: 1.0
            values:
              - 5.0

logging:
  log_dir: logs/
  log_level: debug

server:
  host: 0.0.0.0
  server_port: "9090"
  read_timeout: 30
  write_timeout: 30

marker:
  image_name: autograder-marker
  dockerfile_path: marker/Dockerfile
  submissions_folder: ./files/
  mount_path: /mnt/
  command: marker
  allowed_extensions:
    - py
  container_timeout: 10
