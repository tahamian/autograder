name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CI_IMAGE: ghcr.io/${{ github.repository }}/ci:latest

jobs:
  # Build and push the CI image when the Dockerfile changes, or use cached
  build-ci-image:
    name: Build CI Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image: ${{ env.CI_IMAGE }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github
          file: .github/Dockerfile
          push: true
          tags: ${{ env.CI_IMAGE }}
          cache-from: type=registry,ref=${{ env.CI_IMAGE }}
          cache-to: type=inline

  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    needs: build-ci-image
    container:
      image: ${{ needs.build-ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── FlatBuffers generation check ──
      - name: Check generated code
        run: |
          ./schema/generate.sh
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generation produced unstaged changes. Run 'make generate' and commit."
            git status --short
            git diff --stat
            exit 1
          fi

      # ── Go ──
      - name: Go lint
        run: |
          go vet ./...
          UNFORMATTED=$(gofmt -l $(find . -name '*.go' -not -path './internal/models/*'))
          test -z "$UNFORMATTED" || (echo "::error::gofmt needed:"; echo "$UNFORMATTED"; exit 1)

      - name: Go test
        env:
          REDIS_URL: redis://redis:6379
        run: go test ./... -v -count=1

      # ── Frontend ──
      - name: Frontend lint
        run: cd web && deno task lint

      - name: Frontend format check
        run: cd web && deno task fmt:check

      - name: Frontend test
        run: cd web && deno task test

      - name: Frontend build
        run: cd web && deno task build

      # ── Python ──
      - name: Python install
        run: cd marker && poetry install

      - name: Python lint (yapf)
        run: cd marker && poetry run yapf --diff --recursive --exclude 'marker/generated/*' marker/ tests/

      - name: Python lint (isort)
        run: cd marker && poetry run isort --check-only --diff marker/ tests/

      - name: Python test
        run: cd marker && poetry run pytest tests -v
